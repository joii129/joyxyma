<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8E9E6;--ink:#1C1C1A;--mid:#8A8880;--rule:#E9D5D0;}
html{width:100%;}
body{
  width:100%;min-height:100vh;overflow-x:hidden;
  font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;
  background-color:var(--bg);
  position:relative;
}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;align-items:center;padding:28px 40px;}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--ink)}
.canvas{width:100vw;height:100vh;position:relative;overflow:hidden;cursor:default;z-index:1;}
.hero-title-wrap{position:absolute;top:120px;left:0;right:0;z-index:6;text-align:center;pointer-events:none;padding:0 24px;}
.hero-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:64px;color:var(--ink);letter-spacing:0.01em;}
.hero-tagline{font-family:'Space Mono',monospace;font-size:14px;color:var(--mid);margin-top:16px;letter-spacing:0.02em;}
.scroll-cue{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:6;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);pointer-events:none;text-align:center;}
.object{position:absolute;z-index:5;display:flex;flex-direction:column;align-items:center;gap:0px;cursor:pointer;transition:opacity 0.6s ease;user-select:none;opacity:0;}
.object.in{opacity:1}
.object:hover{z-index:50}
.obj-icon-wrap{width:100%;height:100%;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);}
.object:hover .obj-placeholder{filter:drop-shadow(0 10px 18px rgba(28,28,26,0.28))}
.object:hover .obj-label{opacity:1;transform:translateY(0)}
.obj-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:filter 0.35s,opacity 0.3s ease;filter:drop-shadow(0 6px 10px rgba(28,28,26,0.16));}
.obj-placeholder svg{width:100%;height:100%;overflow:visible;opacity:0.85}
.obj-placeholder img{width:100%;height:100%;object-fit:cover;border-radius:2px;display:block;}
.obj-photo{position:absolute;top:50%;left:50%;width:210px;height:150px;transform:translate(-50%,-50%) scale(0.82);object-fit:cover;border-radius:6px;opacity:0;pointer-events:none;transition:opacity 0.35s ease,transform 0.35s ease;box-shadow:0 18px 34px rgba(28,28,26,0.35);}
.object:hover .obj-photo{opacity:1;transform:translate(-50%,-50%) scale(1);}
.object:hover .obj-placeholder{opacity:0;}
.obj-label{margin-bottom:-4px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mid);white-space:nowrap;opacity:0;transform:translateY(-4px);transition:all 0.25s ease;background:var(--bg);padding:4px 10px;border-radius:20px;border:1px solid var(--rule);}
.doodle{position:absolute;z-index:1;pointer-events:none;color:var(--mid);opacity:0.4;font-family:'EB Garamond',serif;font-style:italic;display:flex;align-items:center;justify-content:center;}
.reset-view{position:fixed;bottom:36px;right:40px;z-index:10;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);background:none;border:1px solid var(--rule);border-radius:20px;padding:8px 16px;cursor:pointer;transition:all 0.2s;opacity:0;pointer-events:none;}
.reset-view.show{opacity:1;pointer-events:all}
.reset-view:hover{color:var(--ink);border-color:var(--ink)}
.carousel-section{position:relative;z-index:2;background:var(--bg);border-top:1px solid var(--rule);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;}
.carousel-heading{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mid);text-align:center;margin-bottom:56px;}
.slide-stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;max-width:900px;}
.slide-arrow{position:absolute;top:140px;background:none;border:none;font-family:'Space Grotesk',sans-serif;font-size:38px;color:var(--mid);cursor:pointer;padding:12px;line-height:1;transition:color 0.2s;z-index:5;}
.slide-arrow:hover{color:var(--ink)}
.slide-arrow-left{left:0}
.slide-arrow-right{right:0}
.slideshow{cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:20px;}
.slide-icon-wrap{width:280px;height:280px;transition:opacity 0.4s ease;}
.slide-label{font-size:16px;letter-spacing:0.05em;text-align:center;color:var(--ink);text-transform:uppercase;transition:opacity 0.4s ease;}
.slide-year{font-family:'Space Mono',monospace;font-size:12px;color:var(--mid);transition:opacity 0.4s ease;}
.slide-fade{opacity:0}
.project-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;opacity:0;pointer-events:none;transition:opacity 0.45s ease;}
.project-overlay.open{opacity:1;pointer-events:all}
.project-media{width:58%;height:100%;background:#E8E4DC;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.project-media-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);opacity:0.4;}
.gallery-img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s ease;}
.gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(245,243,239,0.85);border:none;width:44px;height:44px;border-radius:50%;font-family:'Space Grotesk',sans-serif;font-size:22px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:background 0.2s;}
.gallery-arrow:hover{background:rgba(245,243,239,1)}
.gallery-arrow-left{left:16px}
.gallery-arrow-right{right:16px}
.gallery-counter{position:absolute;bottom:16px;right:16px;font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);background:rgba(245,243,239,0.85);padding:4px 10px;border-radius:12px;z-index:5;}
.project-info{width:42%;padding:80px 60px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;}
.project-close{position:fixed;top:36px;right:40px;z-index:300;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);cursor:pointer;border:none;background:none;transition:color 0.2s;padding:0;}
.project-close:hover{color:var(--ink)}
.project-tag{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);margin-bottom:16px;}
.project-title{font-family:'EB Garamond',serif;font-size:42px;font-weight:400;line-height:1.1;color:var(--ink);margin-bottom:24px;}
.project-meta{display:flex;gap:32px;margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--rule);flex-wrap:wrap;}
.project-meta-item label{display:block;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);margin-bottom:4px;}
.project-meta-item p{font-size:14px;color:var(--ink)}
.project-desc{font-size:15px;line-height:1.8;color:var(--mid);}
@media(max-width:768px){
  nav{padding:20px 24px}
  .project-overlay{flex-direction:column}
  .project-media{width:100%;height:45%}
  .project-info{width:100%;padding:40px 24px}
  .reset-view{display:none}
  .scroll-cue{display:none}
  body{overflow-y:auto;height:auto;}
  .hero-title-wrap{position:static;padding:96px 24px 0;}
  .hero-title{font-size:36px}
  .canvas{
    width:100%;height:auto;min-height:auto;position:static;
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:36px 20px;
    padding:32px 24px 24px;
    overflow:visible;
  }
  .object{
    position:static !important;left:auto !important;top:auto !important;
    width:auto !important;height:auto !important;
    transform:none !important;
  }
  .obj-icon-wrap{
    width:100% !important;height:auto !important;aspect-ratio:1/1;
    transform:none !important;
  }
  .doodle{display:none}
  .obj-photo{display:none}
  .obj-label{
    opacity:1 !important;transform:none !important;
    position:static;background:none;border:none;padding:2px 0 0;
    text-align:center;white-space:normal;
  }
  .slide-icon-wrap{width:200px;height:200px;}
}
</style>

function renderMedia(container, p, isOverlay){
  const icon = icons[p.tag] || icons.Residential;
  container.innerHTML = '';
  container.style.background = '';
  if(p.img){
    const img = document.createElement('img');
    img.src = p.img;
    img.alt = p.title || p.label;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;'+(isOverlay?'':'border-radius:2px;');
    img.addEventListener('error', ()=>{
      if(isOverlay){
        container.style.background = p.color;
        container.innerHTML = `<div class="project-media-placeholder">${p.title} — Add images here</div>`;
      } else {
        container.innerHTML = icon;
      }
    });
    container.appendChild(img);
  } else if(isOverlay){
    container.style.background = p.color;
    container.innerHTML = `<div class="project-media-placeholder">${p.title} — Add images here</div>`;
  } else {
    container.innerHTML = icon;
  }

  const pos = positions[i];
  const el = document.createElement('div');
  el.className = 'object';
  const w = Math.round(p.w*scale), h = Math.round(p.h*scale);
  el.style.cssText = `left:${pos.x}%;top:${pos.y}%;width:${w}px;height:${h}px;`;
  el.dataset.rotate = pos.r;
  el.innerHTML = `<span class="obj-label">${p.label}</span><div class="obj-icon-wrap" style="transform:rotate(${pos.r}deg)"><div class="obj-placeholder" style="color:${p.color}"></div></div><img class="obj-photo" src="images/${p.id}/1.jpg" alt="">`;
  renderMedia(el.querySelector('.obj-placeholder'), p, false);
  el.querySelector('.obj-photo').addEventListener('error', function(){ this.remove(); });
  el.addEventListener('click',()=>openProject(p));
  canvas.appendChild(el);
  setTimeout(()=>el.classList.add('in'), 80*i);
});

const slideIcon = document.getElementById('slideIcon');
const slideLabel = document.getElementById('slideLabel');
const slideYear = document.getElementById('slideYear');
const slideshowEl = document.getElementById('slideshow');
let slideIndex = 0;

function showSlide(i){
  const p = moreWork[i];
  const wrap = slideIcon.parentElement;
  wrap.classList.add('slide-fade');
  slideLabel.classList.add('slide-fade');
  slideYear.classList.add('slide-fade');
  setTimeout(()=>{
    slideIcon.style.color = p.color;
    renderMedia(slideIcon, p, false);
    slideLabel.textContent = p.label;
    slideYear.textContent = p.year;
    wrap.classList.remove('slide-fade');
    slideLabel.classList.remove('slide-fade');
    slideYear.classList.remove('slide-fade');
  }, 250);
}

slideshowEl.addEventListener('click', ()=>openProject(moreWork[slideIndex]));

let slideTimer;
function startSlideTimer(){
  clearInterval(slideTimer);
  slideTimer = setInterval(()=>{
    slideIndex = (slideIndex+1) % moreWork.length;
    showSlide(slideIndex);
  }, 2000);
}

document.getElementById('prevSlide').addEventListener('click', (e)=>{
  e.stopPropagation();
  slideIndex = (slideIndex-1+moreWork.length) % moreWork.length;
  showSlide(slideIndex);
  startSlideTimer();
});
document.getElementById('nextSlide').addEventListener('click', (e)=>{
  e.stopPropagation();
  slideIndex = (slideIndex+1) % moreWork.length;
  showSlide(slideIndex);
  startSlideTimer();
});

showSlide(slideIndex);
startSlideTimer();

function probeGallery(id, cb){
  const found = [];
  const maxTry = 30;
  let i = 1;
  function tryNext(){
    if(i > maxTry){ cb(found); return; }
    const img = new Image();
    img.onload = ()=>{ found.push(`images/${id}/${i}.jpg`); i++; tryNext(); };
    img.onerror = ()=>{ cb(found); };
    img.src = `images/${id}/${i}.jpg`;
  }
  tryNext();
}

let galleryImages = [];
let galleryIndex = 0;
const overlayMedia = document.getElementById('overlay-media');

function renderGallery(){
  overlayMedia.innerHTML = `
    <img class="gallery-img" src="${galleryImages[galleryIndex]}" alt="">
    <button class="gallery-arrow gallery-arrow-left" id="galleryPrev" aria-label="Previous photo">&#8249;</button>
    <button class="gallery-arrow gallery-arrow-right" id="galleryNext" aria-label="Next photo">&#8250;</button>
    <span class="gallery-counter">${galleryIndex+1} / ${galleryImages.length}</span>
  `;
  document.getElementById('galleryPrev').addEventListener('click', e=>{
    e.stopPropagation();
    galleryIndex = (galleryIndex-1+galleryImages.length) % galleryImages.length;
    renderGallery();
  });
  document.getElementById('galleryNext').addEventListener('click', e=>{
    e.stopPropagation();
    galleryIndex = (galleryIndex+1) % galleryImages.length;
    renderGallery();
  });
}

function openProject(p){
  document.getElementById('overlay-tag').textContent=p.tag;
  document.getElementById('overlay-title').textContent=p.title;
  document.getElementById('overlay-desc').textContent=p.desc;
  document.getElementById('overlay-meta').innerHTML=p.meta.map(m=>`<div class="project-meta-item"><label>${m.l}</label><p>${m.v}</p></div>`).join('');
  document.getElementById('overlay').classList.add('open');
  overlayMedia.style.background = '';
  overlayMedia.innerHTML = '';
  probeGallery(p.id, (found)=>{
    if(found.length > 0){
      galleryImages = found;
      galleryIndex = 0;
      renderGallery();
    } else {
      renderMedia(overlayMedia, p, true);
    }
  });
}
function closeProject(){document.getElementById('overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeProject();});

let dragging=false,startX,startY,curX=0,curY=0;
const resetBtn = document.getElementById('resetView');

function dragStart(x,y){if(isMobile)return;dragging=true;startX=x-curX;startY=y-curY;canvas.style.cursor='grabbing';}
function dragMove(x,y){
  if(!dragging||isMobile)return;
  curX=x-startX;curY=y-startY;
  canvas.style.transform=`translate(${curX}px,${curY}px)`;
  resetBtn.classList.toggle('show',Math.abs(curX)>20||Math.abs(curY)>20);
}
function dragEnd(){dragging=false;canvas.style.cursor='default';}

canvas.addEventListener('mousedown',e=>{if(!e.target.closest('.object'))dragStart(e.clientX,e.clientY);});
window.addEventListener('mousemove',e=>dragMove(e.clientX,e.clientY));
window.addEventListener('mouseup',dragEnd);

canvas.addEventListener('touchstart',e=>{
  if(e.target.closest('.object'))return;
  const t=e.touches[0];dragStart(t.clientX,t.clientY);
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  const t=e.touches[0];dragMove(t.clientX,t.clientY);
},{passive:true});
canvas.addEventListener('touchend',dragEnd);

resetBtn.addEventListener('click',()=>{
  curX=0;curY=0;
  canvas.style.transform='translate(0px,0px)';
  resetBtn.classList.remove('show');
});

document.querySelectorAll('.object').forEach(el=>{
  const r = el.dataset.rotate;
  const wrap = el.querySelector('.obj-icon-wrap');
  el.addEventListener('mouseenter',()=>{
    if(!dragging)wrap.style.transform=`rotate(${r}deg) scale(1.06) translateY(-4px)`;
  });
  el.addEventListener('mouseleave',()=>{
    wrap.style.transform=`rotate(${r}deg)`;
  });
});
</script>
</body>
